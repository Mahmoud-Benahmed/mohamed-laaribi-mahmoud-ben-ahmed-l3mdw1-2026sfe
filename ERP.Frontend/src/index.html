<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ERPFrontend</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <link rel="stylesheet" href="assets/fonts/dm-sans.css">
  <link rel="stylesheet" href="assets/fonts/inter.css">
  <link rel="stylesheet" href="assets/fonts/material-icons.css">
  <link rel="stylesheet" href="assets/fonts/outfit.css">
  <link rel="stylesheet" href="assets/fonts/roboto.css">
  <link rel="stylesheet" href="assets/fonts/syne.css">
  <script>
    (function () {
      const saved = localStorage.getItem('userSettings');
      if (!saved) return;

      try {
        const { theme } = JSON.parse(saved);
        if (theme) {
          document.documentElement.setAttribute('data-theme', theme);
        }
      } catch {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>

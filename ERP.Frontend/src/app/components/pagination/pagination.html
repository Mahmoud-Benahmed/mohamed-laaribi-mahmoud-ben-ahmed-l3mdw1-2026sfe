<div class="pagination">

  <ng-container>
    <span class="page-info" *ngIf="totalPages > 1">{{ 'pagination.page_of' | translate : { current: pageNumber, total: totalPages } }}</span>

    <!-- Navigation only when more than 1 page -->
    <button class="page-btn" *ngIf="totalPages > 1" (click)="prev()" [disabled]="pageNumber === 1">{{ 'pagination.previous' | translate }}</button>
    <!-- Page size selector always visible -->
    <select class="page-btn page-size-select"
            [ngModel]="pageSize"
            (ngModelChange)="onSizeChange($event)">
      <option *ngFor="let size of pageSizeOptions" [value]="size">{{ 'pagination.items_per_page' | translate : { size: size } }}</option>
    </select>

    <button class="page-btn" *ngIf="totalPages > 1" (click)="next()" [disabled]="pageNumber === totalPages">{{ 'pagination.next' | translate }}</button>
  </ng-container>

</div>
